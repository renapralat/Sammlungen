<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Sammlungen</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    input::placeholder { color: rgba(255,255,255,0.4); }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus { outline: 2px solid rgba(139,92,246,0.6); outline-offset: 1px; }
    .img-thumb { width:72px; height:54px; object-fit:cover; border-radius:6px; cursor:pointer; display:block; }
    .img-upload-btn { width:72px; height:54px; border-radius:6px; border:2px dashed rgba(139,92,246,0.5);
      background:rgba(139,92,246,0.15); color:white; cursor:pointer; font-size:1.3rem;
      display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .img-upload-btn:hover { background:rgba(139,92,246,0.3); }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;background:linear-gradient(135deg,#1e293b 0%,#581c87 50%,#1e293b 100%);display:flex;align-items:center;justify-content:center;color:white;font-family:system-ui">
      Lade…
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useCallback } = React;

    // ── Supabase ──────────────────────────────────────────────────────────────
    const sb = supabase.createClient(
      "https://csyqtynnvoggydofgaua.supabase.co",
      "sb_publishable_2meBoS5JXmGgJt9MAKq02g_cOWhgSqf"
    );
    const BUCKET = "sammlungen-images";

    // ── Voice Hook ────────────────────────────────────────────────────────────
    const useVoice = (onResult) => {
      const recRef = useRef(null);
      const cbRef  = useRef(onResult);
      const [listening, setListening] = useState(false);
      const [supported, setSupported] = useState(false);
      useEffect(() => { cbRef.current = onResult; });
      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        setSupported(true);
        const rec = new SR();
        rec.lang = "de-DE"; rec.continuous = false; rec.interimResults = false;
        rec.onresult = (e) => cbRef.current(e.results[0][0].transcript);
        rec.onerror = () => setListening(false);
        rec.onend = () => setListening(false);
        recRef.current = rec;
        return () => { try { rec.abort(); } catch (_) {} };
      }, []);
      const start = () => {
        if (!recRef.current || listening) return;
        try { recRef.current.start(); setListening(true); } catch (_) { setListening(false); }
      };
      const stop = () => {
        if (recRef.current && listening) recRef.current.stop();
        setListening(false);
      };
      return { listening, supported, start, stop };
    };

    // ── Constants ─────────────────────────────────────────────────────────────
    const PALETTE = ["#a855f7","#3b82f6","#f59e0b","#10b981","#ef4444","#ec4899","#06b6d4","#6366f1","#f97316","#84cc16"];

    // ── CSV helpers ───────────────────────────────────────────────────────────
    const parseCSV = (text) => {
      const lines = text.replace(/^﻿/, "").split(/\r?\n/).filter(Boolean);
      const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
      return lines.slice(1).map(line => {
        const cells = []; let inQ = false, cell = "";
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"' && !inQ)                           { inQ = true; }
          else if (c === '"' && inQ && line[i+1] === '"')  { cell += '"'; i++; }
          else if (c === '"' && inQ)                       { inQ = false; }
          else if (c === "," && !inQ)                      { cells.push(cell); cell = ""; }
          else                                             { cell += c; }
        }
        cells.push(cell);
        const row = {};
        headers.forEach((h, i) => { row[h] = cells[i] || ""; });
        return row;
      });
    };

    const toCSV = (fields, rows) => {
      const header = fields.join(",");
      const body   = rows.map(r => fields.map(f => `"${(r[f]||"").replace(/"/g,'""')}"`).join(","));
      return "﻿" + [header, ...body].join("\n");
    };

    // ── Print (Tabellenform mit Bildern rechts) ───────────────────────────────
    const printCollection = (cat, fields, rows, getImgUrl) => {
      const date = new Date().toLocaleDateString("de-DE", { day:"2-digit", month:"long", year:"numeric" });
      const hasImages = rows.some(r => r.__img1 || r.__img2);
      const win = window.open("", "_blank");
      win.document.write(`<!DOCTYPE html><html lang="de"><head>
        <meta charset="UTF-8">
        <title>${cat.icon} ${cat.name}</title>
        <style>
          body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; color: #1e293b; font-size: 12px; }
          h1 { font-size: 18px; margin-bottom: 2px; }
          .meta { color: #64748b; font-size: 11px; border-bottom: 2px solid #334155; padding-bottom: 6px; margin-bottom: 10px; }
          table { width: 100%; border-collapse: collapse; table-layout: fixed; }
          th { background: #334155; color: white; padding: 6px 8px; text-align: left; font-size: 11px; font-weight: 700; }
          td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top; word-break: break-word; }
          tr:nth-child(even) td { background: #f8fafc; }
          .col-first { white-space: nowrap; font-weight: 600; width: auto; }
          .col-img { width: 130px; text-align: center; }
          .img-wrap { display: flex; gap: 4px; justify-content: center; }
          .img-wrap img { width: 56px; height: 42px; object-fit: cover; border-radius: 3px; border: 1px solid #cbd5e1; }
          .img-label { font-size: 9px; color: #94a3b8; text-align: center; }
          @media print { body { margin: 10px; } }
        </style>
      </head><body>
        <h1>${cat.icon} ${cat.name}</h1>
        <div class="meta">${rows.length} Einträge &nbsp;·&nbsp; Stand: ${date}</div>
        <table>
          <thead><tr>
            ${fields.map((f, i) => `<th class="${i===0?'col-first':''}">${f}</th>`).join("")}
            ${hasImages ? `<th class="col-img">Bilder</th>` : ""}
          </tr></thead>
          <tbody>
            ${rows.map(row => `<tr>
              ${fields.map((f, i) => `<td class="${i===0?'col-first':''}">${row[f] || "—"}</td>`).join("")}
              ${hasImages ? `<td class="col-img">
                ${(row.__img1 || row.__img2) ? `
                  <div class="img-wrap">
                    ${row.__img1 ? `<div><img src="${getImgUrl(row.__img1)}" /><div class="img-label">Bild 1</div></div>` : ""}
                    ${row.__img2 ? `<div><img src="${getImgUrl(row.__img2)}" /><div class="img-label">Bild 2</div></div>` : ""}
                  </div>` : ""}
              </td>` : ""}
            </tr>`).join("")}
          </tbody>
        </table>
      </body></html>`);
      win.document.close();
      setTimeout(() => win.print(), 400);
    };

    // ── Styles ────────────────────────────────────────────────────────────────
    const BG  = { minHeight:"100vh", background:"linear-gradient(135deg,#1e293b 0%,#581c87 50%,#1e293b 100%)", color:"white", padding:"0.5rem" };
    const inp = (x) => ({ padding:"0.4rem 0.6rem", borderRadius:"6px", border:"1px solid rgba(255,255,255,0.2)", background:"rgba(0,0,0,0.3)", color:"white", fontSize:"0.9rem", ...x });
    const btn = (bg, x) => ({ padding:"0.45rem 0.9rem", border:"none", borderRadius:"8px", background:bg||"rgba(255,255,255,0.1)", color:"white", cursor:"pointer", fontSize:"0.85rem", fontWeight:"600", ...x });

    // ── Image Slot Component ──────────────────────────────────────────────────
    function ImageSlot({ slot, path, getImgUrl, onUpload, onDelete }) {
      const fileRef = useRef(null);
      const label = slot === 1 ? "Vorderseite · Bild 1" : "Rückseite · Bild 2";
      return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"0.3rem" }}>
          <span style={{ fontSize:"0.7rem", color:"rgba(255,255,255,0.45)", whiteSpace:"nowrap" }}>{label}</span>
          {path ? (
            <div style={{ position:"relative" }}>
              <img
                className="img-thumb"
                src={getImgUrl(path)}
                onClick={() => window.open(getImgUrl(path), "_blank")}
                title="Klicken zum Vergrößern"
              />
              <button
                onClick={onDelete}
                title="Bild entfernen"
                style={{ position:"absolute", top:-7, right:-7, width:18, height:18,
                  borderRadius:"50%", border:"none", background:"#ef4444",
                  color:"white", cursor:"pointer", fontSize:"0.65rem", lineHeight:1,
                  display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>
          ) : (
            <>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }}
                onChange={e => { const f=e.target.files?.[0]; if(f) onUpload(f); e.target.value=""; }} />
              <button className="img-upload-btn" onClick={() => fileRef.current?.click()} title="Bild hochladen">📷</button>
            </>
          )}
        </div>
      );
    }

    // ── Login Screen ──────────────────────────────────────────────────────────
    function LoginScreen() {
      const [tab,      setTab]      = useState("login");
      const [email,    setEmail]    = useState("");
      const [password, setPassword] = useState("");
      const [error,    setError]    = useState("");
      const [success,  setSuccess]  = useState("");
      const [loading,  setLoading]  = useState(false);

      const login = async (e) => {
        e.preventDefault();
        setLoading(true); setError("");
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { setError("E-Mail oder Passwort falsch"); setLoading(false); }
      };

      const register = async (e) => {
        e.preventDefault();
        setLoading(true); setError("");
        const { error } = await sb.auth.signUp({ email, password });
        if (error) { setError(error.message); setLoading(false); }
        else { setSuccess("✓ Account erstellt – du kannst dich jetzt einloggen!"); setTab("login"); setLoading(false); }
      };

      const tabStyle = (active) => ({
        flex:1, padding:"0.5rem", border:"none", cursor:"pointer", fontWeight:"600", fontSize:"0.85rem",
        background: active ? "rgba(139,92,246,0.4)" : "transparent",
        color: active ? "white" : "rgba(255,255,255,0.5)",
        borderBottom: active ? "2px solid #a855f7" : "2px solid transparent"
      });

      return (
        <div style={{ ...BG, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ width:"100%", maxWidth:360, background:"rgba(0,0,0,0.45)", borderRadius:"16px", padding:"2rem" }}>
            <h1 style={{ fontSize:"1.8rem", marginBottom:"1.25rem",
              background:"linear-gradient(135deg,#fbbf24,#f472b6)",
              WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text" }}>
              📚 Sammlungen
            </h1>
            <div style={{ display:"flex", marginBottom:"1.25rem", borderBottom:"1px solid rgba(255,255,255,0.15)" }}>
              <button style={tabStyle(tab==="login")}  onClick={() => { setTab("login");  setError(""); setSuccess(""); }}>Einloggen</button>
              <button style={tabStyle(tab==="signup")} onClick={() => { setTab("signup"); setError(""); setSuccess(""); }}>Registrieren</button>
            </div>
            {success && <p style={{ fontSize:"0.8rem", color:"#86efac", marginBottom:"0.75rem" }}>{success}</p>}
            <form onSubmit={tab==="login" ? login : register} style={{ display:"flex", flexDirection:"column", gap:"0.75rem" }}>
              <input type="email" placeholder="E-Mail" value={email}
                onChange={e => setEmail(e.target.value)} required style={inp({ width:"100%" })} />
              <input type="password" placeholder="Passwort (mind. 6 Zeichen)" value={password}
                onChange={e => setPassword(e.target.value)} required minLength={6} style={inp({ width:"100%" })} />
              {error && <p style={{ fontSize:"0.8rem", color:"#fca5a5" }}>{error}</p>}
              <button type="submit" disabled={loading}
                style={btn("linear-gradient(135deg,#a855f7,#6366f1)", { width:"100%", padding:"0.65rem", opacity:loading?0.7:1 })}>
                {loading ? "…" : tab==="login" ? "Einloggen" : "Account erstellen"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App({ user }) {
      const [cats,         setCats]         = useState({});
      const [data,         setData]         = useState({});
      const [active,       setActive]       = useState(null);
      const [sortCol,      setSortCol]      = useState(null);
      const [sortDir,      setSortDir]      = useState("asc");
      const [filter,       setFilter]       = useState("");
      const [msg,          setMsg]          = useState("");
      const [addCatOpen,   setAddCatOpen]   = useState(false);
      const [newName,      setNewName]      = useState("");
      const [newIcon,      setNewIcon]      = useState("📁");
      const [newColor,     setNewColor]     = useState(PALETTE[3]);
      const [newFields,    setNewFields]    = useState("");
      const [loading,      setLoading]      = useState(true);
      const [expandedImgs, setExpandedImgs] = useState(new Set());
      const csvRef = useRef(null);

      const flash = (m, ms=2200) => { setMsg(m); setTimeout(() => setMsg(""), ms); };
      const voice = useVoice((txt) => setFilter(txt));

      const cat    = active ? cats[active] : null;
      const fields = cat ? cat.fields : [];
      const rows   = active ? (data[active] || []) : [];

      // ── Load ────────────────────────────────────────────────────────────────
      useEffect(() => {
        const load = async () => {
          const { data: catRows }  = await sb.from("categories").select("*").order("created_at");
          const { data: itemRows } = await sb.from("items").select("*").order("created_at");
          const catMap = {}, dataMap = {};
          (catRows || []).forEach(c => {
            catMap[c.id]  = { name:c.name, icon:c.icon, color:c.color, fields:c.fields };
            dataMap[c.id] = [];
          });
          (itemRows || []).forEach(i => {
            if (dataMap[i.category_id]) dataMap[i.category_id].push({ id:i.id, ...i.data });
          });
          setCats(catMap); setData(dataMap); setLoading(false);
        };
        load();
      }, []);

      // ── Image helpers ───────────────────────────────────────────────────────
      const getImgUrl = useCallback((path) => {
        const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
        return data.publicUrl;
      }, []);

      const toggleImgPanel = (id) => setExpandedImgs(prev => {
        const next = new Set(prev);
        if (next.has(id)) next.delete(id); else next.add(id);
        return next;
      });

      const uploadImage = async (itemId, slot, file) => {
        const key = `__img${slot}`;
        const row = (data[active]||[]).find(r => r.id===itemId);
        if (!row) return;

        // Delete old file first (avoids browser-cache showing stale image)
        if (row[key]) {
          await sb.storage.from(BUCKET).remove([row[key]]);
        }

        // Unique filename per upload so browser never serves a cached old version
        const ext = file.name.split(".").pop().toLowerCase() || "jpg";
        const path = `${user.id}/${itemId}/img${slot}_${Date.now()}.${ext}`;
        const { error } = await sb.storage.from(BUCKET).upload(path, file);
        if (error) { flash("✗ Bild-Upload fehlgeschlagen"); return; }

        const { id:_, ...rowData } = row;
        await sb.from("items").update({ data:{ ...rowData, [key]:path } }).eq("id", itemId);
        setData(prev => ({
          ...prev,
          [active]: (prev[active]||[]).map(r => r.id===itemId ? { ...r, [key]:path } : r)
        }));
        flash("✓ Bild gespeichert");
      };

      const deleteImage = async (itemId, slot) => {
        const row = (data[active]||[]).find(r => r.id===itemId);
        if (!row) return;
        const key = `__img${slot}`;
        const path = row[key];
        if (path) await sb.storage.from(BUCKET).remove([path]);
        const { id:_, ...rowData } = row;
        const newData = { ...rowData }; delete newData[key];
        await sb.from("items").update({ data:newData }).eq("id", itemId);
        setData(prev => ({
          ...prev,
          [active]: (prev[active]||[]).map(r => {
            if (r.id !== itemId) return r;
            const nr = { ...r }; delete nr[key]; return nr;
          })
        }));
        flash("✓ Bild entfernt");
      };

      // ── Filter + Sort ───────────────────────────────────────────────────────
      const visible = (() => {
        let r = rows;
        if (filter.trim()) {
          const terms = filter.toLowerCase().split(" ").filter(Boolean);
          r = r.filter(item => terms.some(term => {
            const starEnd = term.endsWith("*"), starStart = term.startsWith("*");
            const core = term.replace(/^\*|\*$/g, "");
            return Object.values(item).some(v => {
              const s = String(v || "").toLowerCase();
              const words = s.split(/[\s\-,;.!?()\[\]{}'"]+/);
              if (starEnd)   return words.some(w => w.startsWith(core));
              if (starStart) return words.some(w => w.endsWith(core));
              return words.includes(core);
            });
          }));
        }
        if (sortCol) {
          r = [...r].sort((a, b) => {
            const av = String(a[sortCol]||"").toLowerCase();
            const bv = String(b[sortCol]||"").toLowerCase();
            return sortDir === "asc" ? av.localeCompare(bv,"de") : bv.localeCompare(av,"de");
          });
        }
        return r;
      })();

      const handleSort = (col) => {
        if (sortCol === col) setSortDir(d => d==="asc"?"desc":"asc");
        else { setSortCol(col); setSortDir("asc"); }
      };

      // ── Row ops ─────────────────────────────────────────────────────────────
      const addRow = async () => {
        const emptyData = Object.fromEntries(fields.map(f => [f,""]));
        const { data: created } = await sb.from("items")
          .insert([{ category_id:active, user_id:user.id, data:emptyData }])
          .select();
        if (!created?.length) return;
        const newRow = { id:created[0].id, ...emptyData };
        setData(prev => ({ ...prev, [active]: [newRow, ...(prev[active]||[])] }));
        setSortCol(null);
      };

      const cellChange = (id, field, value) =>
        setData(prev => ({
          ...prev,
          [active]: (prev[active]||[]).map(r => r.id===id ? { ...r, [field]:value } : r)
        }));

      const saveCell = async (id, field, value) => {
        const row = (data[active]||[]).find(r => r.id===id);
        if (!row) return;
        const { id:_, ...rowData } = row;
        await sb.from("items").update({ data:{ ...rowData, [field]:value } }).eq("id", id);
      };

      const delRow = async (id) => {
        // Also delete images from storage
        const row = (data[active]||[]).find(r => r.id===id);
        if (row) {
          const toRemove = [row.__img1, row.__img2].filter(Boolean);
          if (toRemove.length) await sb.storage.from(BUCKET).remove(toRemove);
        }
        setData(prev => ({ ...prev, [active]: (prev[active]||[]).filter(r => r.id!==id) }));
        await sb.from("items").delete().eq("id", id);
      };

      // ── CSV ─────────────────────────────────────────────────────────────────
      const exportCSV = () => {
        if (!rows.length) { flash("⚠ Keine Daten"); return; }
        const blob = new Blob([toCSV(fields, rows)], { type:"text/csv;charset=utf-8;" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${cat.name}_${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); URL.revokeObjectURL(a.href);
        flash("✓ CSV exportiert");
      };

      const importCSV = async (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const newRows = parseCSV(ev.target.result);
            const toInsert = newRows.map(r => ({ category_id:active, user_id:user.id, data:r }));
            const { data: created } = await sb.from("items").insert(toInsert).select();
            const mapped = (created||[]).map(i => ({ id:i.id, ...i.data }));
            setData(prev => ({ ...prev, [active]: [...(prev[active]||[]), ...mapped] }));
            flash(`✓ ${mapped.length} Zeilen importiert`);
          } catch { flash("✗ Import-Fehler"); }
        };
        reader.readAsText(file, "UTF-8");
        e.target.value = "";
      };

      // ── Categories ──────────────────────────────────────────────────────────
      const addCategory = async () => {
        const name = newName.trim();
        if (!name) { flash("⚠ Name fehlt"); return; }
        const fs = newFields.split(",").map(f => f.trim()).filter(Boolean);
        if (!fs.length) { flash("⚠ Mindestens ein Feld angeben"); return; }
        const { data: created } = await sb.from("categories")
          .insert([{ user_id:user.id, name, icon:newIcon, color:newColor, fields:fs }])
          .select();
        if (!created?.length) return;
        const id = created[0].id;
        setCats(prev => ({ ...prev, [id]:{ name, icon:newIcon, color:newColor, fields:fs } }));
        setData(prev => ({ ...prev, [id]:[] }));
        setNewName(""); setNewIcon("📁"); setNewFields(""); setNewColor(PALETTE[3]);
        setAddCatOpen(false); flash("✓ Kategorie erstellt");
      };

      const delCategory = async (id) => {
        if (!window.confirm(`Kategorie "${cats[id].name}" wirklich löschen? Alle Daten gehen verloren.`)) return;
        await sb.from("categories").delete().eq("id", id);
        setCats(prev => { const n={...prev}; delete n[id]; return n; });
        setData(prev => { const n={...prev}; delete n[id]; return n; });
        if (active===id) setActive(null);
      };

      const goBack = () => { setActive(null); setFilter(""); setSortCol(null); setExpandedImgs(new Set()); };

      if (loading) return (
        <div style={{ ...BG, display:"flex", alignItems:"center", justifyContent:"center" }}>
          Lade Daten…
        </div>
      );

      // ════ CATEGORY LIST ════════════════════════════════════════════════════
      if (!active) return (
        <div style={BG}>
          <div style={{ maxWidth:480, margin:"0 auto", paddingTop:"2.5rem" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"0.25rem" }}>
              <h1 style={{ fontSize:"2rem",
                background:"linear-gradient(135deg,#fbbf24,#f472b6)",
                WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text" }}>
                📚 Sammlungen
              </h1>
              <button onClick={() => sb.auth.signOut()}
                style={btn("rgba(239,68,68,0.2)", { fontSize:"0.75rem", padding:"0.3rem 0.6rem" })}>
                ⎋ Logout
              </button>
            </div>
            <p style={{ fontSize:"0.75rem", color:"rgba(255,255,255,0.4)", marginBottom:"1.5rem" }}>{user.email}</p>

            {Object.entries(cats).map(([id, c]) => (
              <div key={id} style={{ display:"flex", gap:"0.5rem", marginBottom:"0.6rem" }}>
                <button onClick={() => setActive(id)} style={{
                  ...btn(null), flex:1, padding:"1.1rem", fontSize:"1.05rem", textAlign:"left",
                  background:`linear-gradient(135deg, ${c.color}, ${c.color}99)`
                }}>
                  {c.icon} {c.name}
                  <span style={{ float:"right", fontSize:"0.75rem", opacity:0.6 }}>
                    {data[id]?.length || 0} Einträge
                  </span>
                </button>
                <button onClick={() => delCategory(id)}
                  style={{ ...btn("rgba(239,68,68,0.2)"), padding:"0.5rem 0.7rem" }}
                  title="Kategorie löschen">🗑</button>
              </div>
            ))}

            {!addCatOpen ? (
              <button onClick={() => setAddCatOpen(true)} style={{
                ...btn(), width:"100%", padding:"0.9rem", marginTop:"0.5rem",
                border:"2px dashed rgba(255,255,255,0.25)", fontSize:"1rem"
              }}>＋ Neue Kategorie</button>
            ) : (
              <div style={{ background:"rgba(0,0,0,0.45)", borderRadius:"12px", padding:"1rem", marginTop:"0.5rem" }}>
                <div style={{ display:"flex", gap:"0.5rem", marginBottom:"0.5rem" }}>
                  <input value={newIcon} onChange={e => setNewIcon(e.target.value)}
                    placeholder="🏷" style={inp({ width:52, textAlign:"center", fontSize:"1.3rem" })} />
                  <input value={newName} onChange={e => setNewName(e.target.value)}
                    placeholder="Kategoriename" style={inp({ flex:1 })} />
                </div>
                <input value={newFields} onChange={e => setNewFields(e.target.value)}
                  placeholder="Felder (kommagetrennt): Feld1, Feld2, Feld3"
                  style={inp({ width:"100%", marginBottom:"0.5rem" })} />
                <div style={{ display:"flex", gap:"6px", marginBottom:"0.75rem", flexWrap:"wrap" }}>
                  {PALETTE.map(c => (
                    <div key={c} onClick={() => setNewColor(c)} style={{
                      width:24, height:24, borderRadius:"50%", background:c, cursor:"pointer",
                      border: newColor===c ? "3px solid white" : "3px solid transparent", boxSizing:"border-box"
                    }} />
                  ))}
                </div>
                <div style={{ display:"flex", gap:"0.5rem" }}>
                  <button onClick={addCategory} style={btn("linear-gradient(135deg,#10b981,#059669)")}>Erstellen</button>
                  <button onClick={() => setAddCatOpen(false)} style={btn()}>Abbrechen</button>
                </div>
              </div>
            )}
            {msg && <p style={{ marginTop:"1rem", fontSize:"0.85rem",
              color: msg.startsWith("✓") ? "#86efac" : "#fca5a5" }}>{msg}</p>}
          </div>
        </div>
      );

      // ════ COLLECTION VIEW ══════════════════════════════════════════════════
      return (
        <div style={BG}>
          <div style={{ maxWidth:1600, margin:"0 auto", paddingBottom:"5rem" }}>

            {/* Header */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              marginBottom:"0.75rem", flexWrap:"wrap", gap:"0.5rem" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"0.6rem" }}>
                <button onClick={goBack} style={btn()}>← Zurück</button>
                <h2 style={{ margin:0, fontSize:"1.25rem",
                  background:"linear-gradient(135deg,#fbbf24,#f472b6)",
                  WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", backgroundClip:"text" }}>
                  {cat.icon} {cat.name}
                </h2>
                {msg && <span style={{ fontSize:"0.75rem",
                  color: msg.startsWith("✓") ? "#86efac" : "#fca5a5" }}>{msg}</span>}
              </div>
              <div style={{ display:"flex", gap:"0.4rem", flexWrap:"wrap" }}>
                <button onClick={() => printCollection(cat, fields, rows, getImgUrl)}
                  style={btn("linear-gradient(135deg,#f59e0b,#d97706)")}>🖨 Drucken</button>
                <button onClick={exportCSV}
                  style={btn("linear-gradient(135deg,#3b82f6,#06b6d4)")}>⬇ CSV</button>
                <button onClick={() => csvRef.current?.click()}
                  style={btn("linear-gradient(135deg,#6366f1,#8b5cf6)")}>⬆ CSV</button>
                <input ref={csvRef} type="file" accept=".csv" onChange={importCSV} style={{ display:"none" }} />
              </div>
            </div>

            {/* Search */}
            <div style={{ display:"flex", gap:"0.4rem", alignItems:"center", marginBottom:"0.75rem", flexWrap:"wrap" }}>
              <input type="text"
                placeholder="🔍 Suche  (Ei = exakt · Ei* = beginnt mit · *ei = endet mit)"
                value={filter} onChange={e => setFilter(e.target.value)}
                style={inp({ flex:1, maxWidth:400 })} />
              {voice.supported && (
                <button onClick={() => voice.listening ? voice.stop() : voice.start()}
                  title={voice.listening ? "Aufnahme stoppen" : "Spracheingabe (Deutsch)"}
                  style={btn(voice.listening ? "linear-gradient(135deg,#ef4444,#dc2626)" : "linear-gradient(135deg,#6366f1,#8b5cf6)",
                    { minWidth:44, minHeight:40, fontSize:"1.1rem" })}>
                  {voice.listening ? "⏹️" : "🎤"}
                </button>
              )}
              {filter && <button onClick={() => setFilter("")} style={btn()}>✕</button>}
              <span style={{ fontSize:"0.75rem", color:"rgba(255,255,255,0.45)", marginLeft:"0.25rem" }}>
                {visible.length} / {rows.length}
              </span>
            </div>

            {/* Table */}
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse",
                background:"rgba(0,0,0,0.3)", borderRadius:"10px", overflow:"hidden" }}>
                <thead>
                  <tr style={{ background:"rgba(0,0,0,0.45)" }}>
                    {fields.map(f => (
                      <th key={f} onClick={() => handleSort(f)} style={{
                        padding:"0.65rem 0.6rem", textAlign:"left", cursor:"pointer",
                        userSelect:"none", fontSize:"0.8rem",
                        color: sortCol===f ? "#fbbf24" : "rgba(255,255,255,0.65)", whiteSpace:"nowrap"
                      }}>
                        {f}&nbsp;{sortCol===f ? (sortDir==="asc" ? "↑" : "↓") : "⇅"}
                      </th>
                    ))}
                    <th style={{ width:32, fontSize:"0.75rem", color:"rgba(255,255,255,0.4)", textAlign:"center" }}>📷</th>
                    <th style={{ width:32 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((item, idx) => (
                    <React.Fragment key={item.id}>
                      {/* Data row */}
                      <tr style={{
                        background: idx%2===0 ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.065)",
                        borderBottom: expandedImgs.has(item.id) ? "none" : "1px solid rgba(255,255,255,0.05)"
                      }}>
                        {fields.map(f => (
                          <td key={f} style={{ padding:"0.2rem 0.35rem" }}>
                            <input
                              value={item[f] || ""}
                              onChange={e => cellChange(item.id, f, e.target.value)}
                              onBlur={e => saveCell(item.id, f, e.target.value)}
                              style={inp({ width:"100%", minWidth:70, padding:"0.35rem 0.45rem" })}
                            />
                          </td>
                        ))}
                        {/* Camera button – shows indicator if images exist */}
                        <td style={{ padding:"0.2rem 0.25rem", textAlign:"center" }}>
                          <button
                            onClick={() => toggleImgPanel(item.id)}
                            title={expandedImgs.has(item.id) ? "Bilder ausblenden" : "Bilder anzeigen / hochladen"}
                            style={{ background:"transparent", border:"none", cursor:"pointer",
                              fontSize:"1rem", opacity: expandedImgs.has(item.id) ? 1 : 0.5,
                              filter: (item.__img1||item.__img2) ? "none" : "grayscale(1)" }}>
                            {(item.__img1||item.__img2) ? "🖼️" : "📷"}
                          </button>
                        </td>
                        <td style={{ padding:"0.2rem 0.25rem", textAlign:"center" }}>
                          <button onClick={() => delRow(item.id)}
                            style={{ background:"transparent", border:"none",
                              color:"rgba(239,68,68,0.7)", cursor:"pointer", fontSize:"1rem" }}
                            title="Zeile löschen">🗑</button>
                        </td>
                      </tr>

                      {/* Image panel row */}
                      {expandedImgs.has(item.id) && (
                        <tr style={{ background: idx%2===0 ? "rgba(139,92,246,0.08)" : "rgba(139,92,246,0.12)",
                          borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                          <td colSpan={fields.length + 2} style={{ padding:"0.6rem 0.8rem" }}>
                            <div style={{ display:"flex", gap:"1.25rem", alignItems:"flex-start", flexWrap:"wrap" }}>
                              <ImageSlot slot={1} path={item.__img1} getImgUrl={getImgUrl}
                                onUpload={(f) => uploadImage(item.id, 1, f)}
                                onDelete={() => deleteImage(item.id, 1)} />
                              <ImageSlot slot={2} path={item.__img2} getImgUrl={getImgUrl}
                                onUpload={(f) => uploadImage(item.id, 2, f)}
                                onDelete={() => deleteImage(item.id, 2)} />
                              <span style={{ fontSize:"0.7rem", color:"rgba(255,255,255,0.3)", alignSelf:"flex-end", paddingBottom:"0.2rem" }}>
                                Klick auf Bild zum Vergrößern
                              </span>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                  {visible.length === 0 && (
                    <tr>
                      <td colSpan={fields.length+2} style={{
                        padding:"2.5rem", textAlign:"center", color:"rgba(255,255,255,0.35)" }}>
                        {filter ? "Keine Treffer für diese Suche" : "Noch leer – ＋ unten rechts drücken"}
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Floating "Neue Zeile" Button */}
          <button onClick={addRow} title="Neue Zeile hinzufügen"
            style={{
              position:"fixed", bottom:"1.5rem", right:"1.5rem",
              width:58, height:58, borderRadius:"50%", border:"none",
              background:"linear-gradient(135deg,#10b981,#059669)",
              color:"white", fontSize:"2rem", cursor:"pointer",
              boxShadow:"0 4px 24px rgba(0,0,0,0.5)",
              display:"flex", alignItems:"center", justifyContent:"center", zIndex:100
            }}>＋</button>
        </div>
      );
    }

    // ── Root (Auth wrapper) ───────────────────────────────────────────────────
    function Root() {
      const [user,     setUser]     = useState(null);
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        sb.auth.getSession().then(({ data }) => {
          setUser(data.session?.user || null);
          setChecking(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => {
          setUser(session?.user || null);
        });
        return () => subscription.unsubscribe();
      }, []);

      if (checking) return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1e293b 0%,#581c87 50%,#1e293b 100%)",
          display:"flex", alignItems:"center", justifyContent:"center", color:"white" }}>…</div>
      );
      return user ? <App user={user} /> : <LoginScreen />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root />);
  </script>
</body>
</html>
