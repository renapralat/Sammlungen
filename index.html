const useVoice = onResult => {
  const recRef = useRef(null);
  const cbRef = useRef(onResult);
  const [listening, setListening] = useState(false);
  const [supported, setSupported] = useState(false);
  useEffect(() => {
    cbRef.current = onResult;
  });
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    setSupported(true);
    const rec = new SR();
    rec.lang = "de-DE";
    rec.continuous = false;
    rec.interimResults = false;
    rec.onresult = e => cbRef.current(e.results[0][0].transcript);
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    recRef.current = rec;
    return () => {
      try {
        rec.abort();
      } catch (_) {}
    };
  }, []);
  const start = () => {
    if (!recRef.current || listening) return;
    try {
      recRef.current.start();
      setListening(true);
    } catch (_) {
      setListening(false);
    }
  };
  const stop = () => {
    if (recRef.current && listening) recRef.current.stop();
    setListening(false);
  };
  return {
    listening,
    supported,
    start,
    stop
  };
};

const parseCSV = text => {
  const lines = text.replace(/^﻿/, "").split(/\r?\n/).filter(Boolean);
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  return lines.slice(1).map(line => {
    const cells = [];
    let inQ = false,
      cell = "";
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"' && !inQ) {
        inQ = true;
      } else if (c === '"' && inQ && line[i + 1] === '"') {
        cell += '"';
        i++;
      } else if (c === '"' && inQ) {
        inQ = false;
      } else if (c === "," && !inQ) {
        cells.push(cell);
        cell = "";
      } else {
        cell += c;
      }
    }
    cells.push(cell);
    const row = {};
    headers.forEach((h, i) => {
      row[h] = cells[i] || "";
    });
    return row;
  });
};
const toCSV = (fields, rows) => {
  const header = fields.join(",");
  const body = rows.map(r => fields.map(f => `"${(r[f] || "").replace(/"/g, '""')}"`).join(","));
  return "﻿" + [header, ...body].join("\n");
};
